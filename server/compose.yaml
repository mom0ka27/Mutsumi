services:
  server:
    build: .
    image: mutsumi-server:latest
    restart: unless-stopped
    ports:
      - "12091:12091"
    volumes:
      - ./config.yaml:/app/config.yaml
      - ./server.key:/app/server.key
      - ./server.crt:/app/server.crt
      - ./logs:/app/logs
      - ./data:/app/data
      