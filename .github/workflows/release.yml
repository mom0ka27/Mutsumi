name: Draft Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-android:
    runs-on: macos-latest
    env:
      FLUTTER_REVISION: c9a6c484230f8b5e408ec57be1ef71dee1e77020
      ARTIFACT_NAME: Mutsumi-${{ github.ref_name }}
    permissions:
      contents: read
    steps:
      - name: Checkout source
        run: |
          git init .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "$GITHUB_SHA"
          git checkout --detach FETCH_HEAD
      - name: Install Flutter
        run: |
          archive="$(curl --fail --silent --show-error https://storage.googleapis.com/flutter_infra_release/releases/releases_macos.json | python3 -c 'import json, sys; releases = json.load(sys.stdin); revision = sys.argv[1]; print(next(item["archive"] for item in releases["releases"] if item["hash"] == revision))' "$FLUTTER_REVISION")"
          curl --fail --silent --show-error --location "https://storage.googleapis.com/flutter_infra_release/releases/${archive}" --output flutter.zip
          unzip -q flutter.zip
          echo "$GITHUB_WORKSPACE/flutter/bin" >> "$GITHUB_PATH"
      - name: Restore Pub cache
        uses: actions/cache@v6
        with:
          path: ~/.pub-cache
          key: v2-${{ runner.os }}-${{ runner.arch }}-flutter-${{ env.FLUTTER_REVISION }}-pub-${{ hashFiles('pubspec.lock') }}
      - name: Restore Gradle cache
        uses: actions/cache@v6
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: v2-${{ runner.os }}-${{ runner.arch }}-flutter-${{ env.FLUTTER_REVISION }}-gradle-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties', 'android/settings.gradle.kts', 'android/build.gradle.kts', 'android/app/build.gradle.kts') }}
      - name: Get dependencies
        run: flutter pub get --enforce-lockfile
      - name: Build Android ARM64 APK
        env:
          DANDANPLAY_APP_ID: ${{ secrets.DANDANPLAY_APP_ID }}
          DANDANPLAY_APP_SECRET: ${{ secrets.DANDANPLAY_APP_SECRET }}
        run: ./scripts/build_android_arm64_apk.sh
      - name: Upload Android APK
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARTIFACT_NAME }}-android
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          if-no-files-found: error

  build-ios:
    runs-on: macos-latest
    env:
      FLUTTER_REVISION: c9a6c484230f8b5e408ec57be1ef71dee1e77020
      ARTIFACT_NAME: Mutsumi-${{ github.ref_name }}
    permissions:
      contents: read
    steps:
      - name: Checkout source
        run: |
          git init .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "$GITHUB_SHA"
          git checkout --detach FETCH_HEAD
      - name: Install Flutter
        run: |
          archive="$(curl --fail --silent --show-error https://storage.googleapis.com/flutter_infra_release/releases/releases_macos.json | python3 -c 'import json, sys; releases = json.load(sys.stdin); revision = sys.argv[1]; print(next(item["archive"] for item in releases["releases"] if item["hash"] == revision))' "$FLUTTER_REVISION")"
          curl --fail --silent --show-error --location "https://storage.googleapis.com/flutter_infra_release/releases/${archive}" --output flutter.zip
          unzip -q flutter.zip
          echo "$GITHUB_WORKSPACE/flutter/bin" >> "$GITHUB_PATH"
      - name: Restore Pub cache
        uses: actions/cache@v6
        with:
          path: ~/.pub-cache
          key: v2-${{ runner.os }}-${{ runner.arch }}-flutter-${{ env.FLUTTER_REVISION }}-pub-${{ hashFiles('pubspec.lock') }}
      - name: Restore CocoaPods cache
        uses: actions/cache@v6
        with:
          path: |
            ~/Library/Caches/CocoaPods
            ios/Pods
          key: v2-${{ runner.os }}-${{ runner.arch }}-flutter-${{ env.FLUTTER_REVISION }}-pods-${{ hashFiles('pubspec.lock', 'ios/Podfile.lock') }}
      - name: Get dependencies
        run: flutter pub get --enforce-lockfile
      - name: Build unsigned iOS IPA
        env:
          DANDANPLAY_APP_ID: ${{ secrets.DANDANPLAY_APP_ID }}
          DANDANPLAY_APP_SECRET: ${{ secrets.DANDANPLAY_APP_SECRET }}
        run: |
          flutter build ios --release --no-codesign --dart-define=DANDANPLAY_APP_ID="$DANDANPLAY_APP_ID" --dart-define=DANDANPLAY_APP_SECRET="$DANDANPLAY_APP_SECRET"
          mkdir -p build/ios/ipa build/ios/payload/Payload
          ditto build/ios/iphoneos/Runner.app build/ios/payload/Payload/Runner.app
          (
            cd build/ios/payload
            zip -qry ../ipa/Runner.ipa Payload
          )
          rm -rf build/ios/payload
      - name: Upload iOS IPA
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARTIFACT_NAME }}-ios
          path: build/ios/ipa/Runner.ipa
          if-no-files-found: error

  package-server:
    runs-on: macos-latest
    env:
      ARTIFACT_NAME: Mutsumi-${{ github.ref_name }}
    permissions:
      contents: read
    steps:
      - name: Checkout source
        run: |
          git init .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "$GITHUB_SHA"
          git checkout --detach FETCH_HEAD
      - name: Package server update asset
        run: |
          set -euo pipefail
          server_asset="mutsumi-server-${GITHUB_REF_NAME}.zip"
          (
            cd server
            zip -qry "../${server_asset}" . -x '*/.DS_Store' '.DS_Store'
          )
          sha256sum "${server_asset}" > "${server_asset}.sha256"
      - name: Upload server package
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARTIFACT_NAME }}-server
          path: |
            mutsumi-server-${{ github.ref_name }}.zip
            mutsumi-server-${{ github.ref_name }}.zip.sha256
          if-no-files-found: error

  release:
    needs: [build-android, build-ios, package-server]
    runs-on: ubuntu-latest
    env:
      ARTIFACT_NAME: Mutsumi-${{ github.ref_name }}
    permissions:
      contents: write
    steps:
      - name: Download Android APK
        uses: actions/download-artifact@v7
        with:
          name: ${{ env.ARTIFACT_NAME }}-android
      - name: Download iOS IPA
        uses: actions/download-artifact@v7
        with:
          name: ${{ env.ARTIFACT_NAME }}-ios
      - name: Download server package
        uses: actions/download-artifact@v7
        with:
          name: ${{ env.ARTIFACT_NAME }}-server
      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          server_asset="mutsumi-server-${GITHUB_REF_NAME}.zip"
          gh release create "$GITHUB_REF_NAME" \
            --draft \
            --title "$GITHUB_REF_NAME" \
            app-arm64-v8a-release.apk \
            Runner.ipa \
            "${server_asset}" \
            "${server_asset}.sha256"
