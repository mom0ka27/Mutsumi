name: Draft Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout source
        run: |
          git init .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "$GITHUB_SHA"
          git checkout --detach FETCH_HEAD
      - name: Install Flutter
        run: |
          archive="$(curl --fail --silent --show-error https://storage.googleapis.com/flutter_infra_release/releases/releases_macos.json | python3 -c 'import json, sys; releases = json.load(sys.stdin); revision = releases["current_release"]["stable"]; print(next(item["archive"] for item in releases["releases"] if item["hash"] == revision))')"
          curl --fail --silent --show-error --location "https://storage.googleapis.com/flutter_infra_release/releases/${archive}" --output flutter.zip
          unzip -q flutter.zip
          echo "$GITHUB_WORKSPACE/flutter/bin" >> "$GITHUB_PATH"
      - name: Restore dependency caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-flutter-${{ hashFiles('.metadata') }}-deps-${{ hashFiles('pubspec.lock', 'android/gradle/wrapper/gradle-wrapper.properties', 'android/settings.gradle.kts', 'android/build.gradle.kts', 'android/app/build.gradle.kts') }}
          restore-keys: |
            ${{ runner.os }}-flutter-${{ hashFiles('.metadata') }}-deps-
      - name: Install dependencies
        run: flutter pub get
      - name: Build Android ARM64 APK
        env:
          DANDANPLAY_APP_ID: ${{ secrets.DANDANPLAY_APP_ID }}
          DANDANPLAY_APP_SECRET: ${{ secrets.DANDANPLAY_APP_SECRET }}
        run: ./scripts/build_android_arm64_apk.sh
      - name: Build unsigned iOS IPA
        env:
          DANDANPLAY_APP_ID: ${{ secrets.DANDANPLAY_APP_ID }}
          DANDANPLAY_APP_SECRET: ${{ secrets.DANDANPLAY_APP_SECRET }}
        run: |
          flutter build ios --release --no-codesign --dart-define=DANDANPLAY_APP_ID="$DANDANPLAY_APP_ID" --dart-define=DANDANPLAY_APP_SECRET="$DANDANPLAY_APP_SECRET"
          mkdir -p build/ios/ipa build/ios/payload/Payload
          ditto build/ios/iphoneos/Runner.app build/ios/payload/Payload/Runner.app
          (
            cd build/ios/payload
            zip -qry ../ipa/Runner.ipa Payload
          )
          rm -rf build/ios/payload
      - name: Package server
        run: |
          mkdir -p build/server
          zip -qry build/server/mutsumi-server.zip server -x 'server/config.yaml'
      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: mutsumi-android-apk
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          if-no-files-found: error
      - name: Upload iOS IPA
        uses: actions/upload-artifact@v4
        with:
          name: mutsumi-ios-ipa
          path: build/ios/ipa/Runner.ipa
          if-no-files-found: error
      - name: Upload server package
        uses: actions/upload-artifact@v4
        with:
          name: mutsumi-server
          path: build/server/mutsumi-server.zip
          if-no-files-found: error
      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --draft \
            --title "$GITHUB_REF_NAME" \
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk \
            build/ios/ipa/Runner.ipa \
            build/server/mutsumi-server.zip
